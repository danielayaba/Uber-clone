version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clm_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: uberclone
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: clm_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clm_redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clm_backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/uberclone
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: npm run start:dev

  ngrok:
    image: ngrok/ngrok:latest
    container_name: clm_ngrok
    environment:
      NGROK_AUTHTOKEN: "305jDA4a2LVUElEZHJBBWIrmGN0_4A7YDAorNRwY9UKMLAnnQ"
    command:
      - "http"
      - "backend:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
